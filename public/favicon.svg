<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="Time Calculator favicon">
  <defs>
    <radialGradient id="bg" cx="30%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#dde1ff" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#b8c3ff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#131b2e" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="#444654" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="22" fill="none" stroke="#b8c3ff" stroke-opacity="0.25" stroke-width="1.25"/>
  <!-- clock hands -->
  <path d="M32 18v14l9 5" fill="none" stroke="#b8c3ff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
